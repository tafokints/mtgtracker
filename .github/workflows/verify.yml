name: Verify

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '17 14 * * *'

permissions:
  contents: read

jobs:
  local-verification:
    name: Local verification
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check whitespace
        run: git diff --check

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

  production-monitor:
    name: Production monitor
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate live affiliate links
        run: npm run links:validate

      - name: Smoke check production
        run: npm run smoke
